name: Sync Supabase Types

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # toda segunda-feira às 06:00 UTC

jobs:
  sync-types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Generate TypeScript types from production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase gen types typescript \
            --project-id slyagzloscnhplczgosx \
            --schema public \
            > src/integrations/supabase/types.ts

      - name: Commit and push if types changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/integrations/supabase/types.ts
          git diff --cached --quiet || git commit -m "chore: regenerate supabase types from production [skip ci]"
          git push
